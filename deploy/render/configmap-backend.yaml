apiVersion: v1
kind: ConfigMap
metadata:
  name: edu-portal-backend-config
  namespace: edu-portal
data:
  SPRING_PROFILES_ACTIVE: "prod"
  JPA_DDL_AUTO: "validate"
  FLYWAY_ENABLED: "true"
  FLYWAY_VALIDATE_ON_MIGRATE: "true"
  CACHE_TYPE: "redis"
  REDIS_SSL: "true"
  DB_DRIVER: "com.mysql.cj.jdbc.Driver"
  DB_POOL_MAX: "20"
  DB_POOL_MIN_IDLE: "5"
  DB_POOL_CONNECTION_TIMEOUT_MS: "20000"
  APP_DEFAULT_PAGE_SIZE: "20"
  APP_MAX_PAGE_SIZE: "100"
  APP_REPORTS_BACKEND: "oltp"
  APP_REPORTS_EXPORT_MAX_ROWS: "25000"
  APP_HOSTEL_ANALYTICS_EXPORT_MAX_ROWS: "5000"
  APP_LIBRARY_EXPORT_MAX_ROWS: "10000"
  APP_TRANSPORT_OPS_DLQ_RETRY_BATCH_SIZE: "25"
  APP_TRANSPORT_OPS_DLQ_MAX_RETRIES: "5"
  APP_PUBLIC_SPA_BASE_URL: "https://edu-portal-frontend.onrender.com"

