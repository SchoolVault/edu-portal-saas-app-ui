# All runtime tuning via environment variables (Render, K8s ConfigMap, .env, etc.).
# See deploy/render.env.example for a full list.

server:
  port: ${PORT:${SERVER_PORT:8080}}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/}

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:school-erp}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
    group:
      # Ordered: prod-style profile first, then demo-seed so application-demo-seed.yml overrides app.demo-seed.enabled.
      prod-with-demo-seed:
        - prod
        - demo-seed
      ml-with-demo-seed:
        - ml
        - demo-seed
      rel-with-demo-seed:
        - rel
        - demo-seed

  # MySQL 8.x (InnoDB, utf8mb4). Schema = Flyway migrations under db/migration; Hibernate only validates mapping vs DB.
  # Suggested cloud URL params (add as needed): &allowPublicKeyRetrieval=true
  datasource:
    url: ${DEV_DB_URL:jdbc:mysql://localhost:3306/school_erp?useSSL=true&serverTimezone=UTC&createDatabaseIfNotExist=true}
    username: ${DEV_DB_USERNAME:root}
    password: ${DEV_DB_PASSWORD:Arif@#123}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:300000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:600000}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:20000}

  jpa:
    hibernate:
      # validate: fail fast if @Entity columns/types differ from MySQL (common causes: edited migrations, pending Flyway version).
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    # database: mysql  # optional; inferred from JDBC URL
    properties:
      hibernate:
        # Let Hibernate 6 pick MySQL dialect from the driver (avoids HHH90000025). Override: spring.jpa.properties.hibernate.dialect in env/YAML if needed.
        format_sql: ${HIBERNATE_FORMAT_SQL:true}
        jdbc:
          batch_size: ${HIBERNATE_JDBC_BATCH_SIZE:50}
        order_inserts: true
        order_updates: true

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: ${FLYWAY_LOCATIONS:classpath:db/migration}
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    # Fail migrate when applied scripts were changed or DB is ahead/behind in an invalid way
    validate-on-migrate: ${FLYWAY_VALIDATE_ON_MIGRATE:true}
    # Runs Flyway repair before migrate (clears failed entries in flyway_schema_history).
    # Safe only after you have removed partial objects from the failed migration (e.g. dropped all app tables or recreated the DB).
    # See deploy/render.env.example — do not leave true permanently in production.
    repair-on-migrate: ${FLYWAY_REPAIR_ON_MIGRATE:false}

  cache:
    type: ${CACHE_TYPE:redis}
    redis:
      # Namespaces all Spring Cache keys in Redis (shared Valkey/Aiven: use app name + env, e.g. school-erp-prod::)
      key-prefix: ${CACHE_REDIS_KEY_PREFIX:sv::}

  data:
    redis:
      # Optional: set env SPRING_DATA_REDIS_URL=rediss://user:pass@host:port (Aiven Valkey). Do not put url: in YAML with an empty default — Boot rejects ''.
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT_MS:5000}
      ssl:
        enabled: ${REDIS_SSL:false}


  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
    instances:
      paymentGateway:
        baseConfig: default
      emailProvider:
        baseConfig: default
      partnerWebhook:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 2
        waitDuration: 200ms
    instances:
      paymentGateway:
        baseConfig: default
      emailProvider:
        baseConfig: default
      partnerWebhook:
        baseConfig: default

app:
  integration:
    # Optional HTTP hooks for domain-event side effects (empty = no outbound calls).
    email:
      trigger-url: ${APP_INTEGRATION_EMAIL_TRIGGER_URL:}
    webhook:
      url: ${APP_INTEGRATION_WEBHOOK_URL:}

  demo-seed:
    enabled: ${DEMO_SEED_ENABLED:false}

  # Read replica JDBC URL — leave empty to disable routing (single primary only).
  datasource:
    slow-query:
      # Dev/staging: log SQL slower than threshold. Prod: enable only when diagnosing (adds proxy overhead).
      enabled: ${APP_DATASOURCE_SLOW_QUERY_ENABLED:false}
      threshold-ms: ${APP_DATASOURCE_SLOW_QUERY_THRESHOLD_MS:1000}
    read:
      url: ${READ_DATASOURCE_URL:}
      username: ${READ_DB_USERNAME:}
      password: ${READ_DB_PASSWORD:}
      driver-class-name: ${READ_DB_DRIVER:}
      hikari:
        maximum-pool-size: ${READ_DB_POOL_MAX:10}
        minimum-idle: ${READ_DB_POOL_MIN_IDLE:2}

  flyway:
    policy:
      # After startup migrate, fail if any migration is FAILED or still PENDING (belt-and-suspenders).
      fail-on-pending: ${APP_FLYWAY_FAIL_ON_PENDING:true}

  idempotency:
    enabled: ${APP_IDEMPOTENCY_ENABLED:true}
    fail-open-on-redis-error: ${APP_IDEMPOTENCY_FAIL_OPEN:true}
    response-ttl-seconds: ${APP_IDEMPOTENCY_RESPONSE_TTL:86400}
    lock-ttl-seconds: ${APP_IDEMPOTENCY_LOCK_TTL:120}
    max-body-bytes: ${APP_IDEMPOTENCY_MAX_BODY:262144}
    max-key-length: ${APP_IDEMPOTENCY_MAX_KEY_LEN:128}

  # Redis keys for non-cache use (rate limits). Align with spring.cache.redis.key-prefix for one logical app namespace.
  redis:
    key-namespace: ${REDIS_KEY_NAMESPACE:sv}
  cache:
    ttl:
      default-ttl: ${CACHE_TTL_DEFAULT:5m}
      transport-routes: ${CACHE_TTL_TRANSPORT_ROUTES:15m}
      announcement-previews: ${CACHE_TTL_ANNOUNCEMENT_PREVIEWS:90s}
      payroll-structures: ${CACHE_TTL_PAYROLL_STRUCTURES:10m}
      reference-data: ${CACHE_TTL_REFERENCE_DATA:1h}
      permissions: ${CACHE_TTL_PERMISSIONS:15m}
      tenant-config: ${CACHE_TTL_TENANT_CONFIG:10m}
      report-results: ${CACHE_TTL_REPORT_RESULTS:5m}
  jwt:
    secret: ${JWT_SECRET:c2Nob29sLWVycC1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tZ2VuZXJhdGlvbi0yMDI2}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

  dev:
    mode: ${APP_DEV_MODE:false}

  sms:
    provider: ${APP_SMS_PROVIDER:MOCK}
    msg91:
      auth-key: ${APP_SMS_MSG91_AUTH_KEY:}
      sender-id: ${APP_SMS_MSG91_SENDER_ID:}

  otp:
    length: ${APP_OTP_LENGTH:6}
    ttl:
      seconds: ${APP_OTP_TTL_SECONDS:300}
    max:
      attempts: ${APP_OTP_MAX_ATTEMPTS:3}
    resend:
      cooldown:
        seconds: ${APP_OTP_RESEND_COOLDOWN_SECONDS:60}
    rate-limit:
      window:
        minutes: ${APP_OTP_RATE_WINDOW_MINUTES:60}
      max-requests: ${APP_OTP_RATE_MAX_REQUESTS:5}
    exchange:
      ttl:
        seconds: ${APP_OTP_EXCHANGE_TTL_SECONDS:600}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:4200}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:*}

  default-page-size: ${APP_DEFAULT_PAGE_SIZE:20}
  max-page-size: ${APP_MAX_PAGE_SIZE:100}

  jobs:
    fee-reminder-cron: ${APP_JOBS_FEE_REMINDER_CRON:0 15 8 * * *}
    reminders:
      enabled: ${APP_JOBS_REMINDERS_ENABLED:true}
      external-scheduler-only: ${APP_JOBS_REMINDERS_EXTERNAL_ONLY:false}

  internal-jobs:
    # Set APP_INTERNAL_JOB_KEY for POST /api/v1/internal/jobs/reminders/run (Render Cron). Empty = endpoint hidden (404).
    key: ${APP_INTERNAL_JOB_KEY:}

  # Key Id = publishable (rzp_test_… / rzp_live_…). Secret = from same "Generate key" pair. Never commit real values.
  # If RAZORPAY_KEY is set to "" in an IDE env block, Spring uses empty string (not the default) — Checkout then gets 401 on preferences.
  security:
    permit-swagger-anonymous: ${APP_SECURITY_PERMIT_SWAGGER_ANONYMOUS:true}
    permit-actuator-anonymous: ${APP_SECURITY_PERMIT_ACTUATOR_ANONYMOUS:true}
    websocket-allowed-origins: ${APP_WEBSOCKET_ALLOWED_ORIGINS:}

  payments:
    # Parent portal checkout: comma-separated provider ids (matches FeePaymentCheckoutStrategy routing).
    # Production: razorpay only. For server integration tests add e.g. mockpay.
    parent:
      enabled-providers: ${PARENT_FEE_ENABLED_PROVIDERS:razorpay}
    razorpay:
      api-base: ${RAZORPAY_API_BASE:https://api.razorpay.com}
      key: ${RAZORPAY_KEY:}
      secret: ${RAZORPAY_SECRET:}
      webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}
      # Dev only: synthetic order ids if key/secret missing (Checkout.js will 400). Keep false in prod.
      fallback-without-credentials: ${RAZORPAY_FALLBACK_WITHOUT_CREDS:false}

springdoc:
  api-docs:
    path: ${SPRINGDOC_API_DOCS_PATH:/api-docs}
  swagger-ui:
    path: ${SPRINGDOC_SWAGGER_UI_PATH:/swagger-ui.html}
    tags-sorter: alpha
    operations-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics}
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:when-authorized}

logging:
  # Render-friendly single line: correlation + tenant/user from MDC (see CorrelationMdcFilter, JwtAuthenticationFilter).
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [${spring.application.name}] [%thread] [corr:%X{correlationId:-}] [trace:%X{traceId:-}] [tenant:%X{tenantId:-}] [user:%X{userId:-}] [role:%X{userRole:-}] %logger{40} : %msg%n%wEx"
  level:
    com.school.erp: ${LOG_LEVEL_APP:INFO}
    com.school.erp.common.logging: ${LOG_LEVEL_APP_HTTP:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_HIBERNATE_SQL:WARN}
    org.hibernate.orm.jdbc.bind: ${LOG_LEVEL_HIBERNATE_BIND:WARN}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
    org.springframework.web: ${LOG_LEVEL_SPRING_WEB:WARN}
    org.springframework.web.servlet.DispatcherServlet: ${LOG_LEVEL_DISPATCHER_SERVLET:WARN}
    com.zaxxer.hikari: ${LOG_LEVEL_HIKARI:WARN}
    org.springframework.amqp: ${LOG_LEVEL_AMQP:WARN}
    root: ${LOG_LEVEL_ROOT:INFO}
