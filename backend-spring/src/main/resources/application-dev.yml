# Active when spring.profiles.active includes dev (default in application.yml for IDE work).
# For Docker Desktop + Redis + RabbitMQ parity with prod, use profile ml (application-ml.yml) and set DB_URL / REDIS_* / RABBITMQ_*.
#
# Local IDE → Aiven MySQL: set DB_URL, DB_USERNAME, DB_PASSWORD on THIS run configuration (not only system env).
# 1) Aiven → your service → Networking / trusted sources: add your public IP (/32) or temporarily 0.0.0.0/0 to test.
# 2) Confirm credentials outside Spring: mysql -h <host> -P <port> -u avnadmin -p --ssl-mode=REQUIRED defaultdb
# 3) If you still get 1045: reset avnadmin password in Aiven, re-paste into IDE (no trailing newline). Hikari DEBUG below logs jdbcUrl + username at startup.
app:
  auth:
    email-verification:
      # Same as ng serve; override with AUTH_EMAIL_VER_PUBLIC_SPA_BASE_URL or APP_PUBLIC_SPA_BASE_URL.
      public-spa-base-url: ${AUTH_EMAIL_VER_PUBLIC_SPA_BASE_URL:${APP_PUBLIC_SPA_BASE_URL:http://localhost:4200}}
      # Without APP_INTEGRATION_EMAIL_TRIGGER_URL, return the one-time token in the API for paste-in-UI (dev only). Set AUTH_EMAIL_EXPOSE_TOKEN=false to require real email delivery.
      expose-plain-token-in-api-response: ${AUTH_EMAIL_EXPOSE_TOKEN:true}
  demo-seed:
    enabled: true
  dev:
    mode: true
  datasource:
    slow-query:
      enabled: true
      threshold-ms: 500

spring:
  # Datasource URL/user/password come from application.yml (${DB_URL}, ${DB_USERNAME}, ${DB_PASSWORD}).
  # Do not default DB_PASSWORD here: a forgotten env var would send a wrong password (e.g. to Aiven) and cause MySQL 1045.

  # Local IDE: no Redis required — only MySQL (see docker-compose or Aiven). RabbitMQ is optional: if the
  # broker is not running, set SPRING_RABBITMQ_LISTENER_SIMPLE_AUTO_STARTUP=false or start Rabbit (compose).
  cache:
    type: none
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        # Avoid startup failure when dev runs without a local broker; set true when Rabbit is up.
        auto-startup: ${SPRING_RABBITMQ_LISTENER_SIMPLE_AUTO_STARTUP:false}

  jpa:
    show-sql: false
  flyway:
    clean-disabled: false

# Local dev: Redis off; Rabbit health follows broker availability.
management:
  health:
    redis:
      enabled: false

logging:
  level:
    com.school.erp: DEBUG
    org.hibernate.SQL: DEBUG
    com.zaxxer.hikari.HikariConfig: DEBUG
