# Active when spring.profiles.active includes dev (default in application.yml for local work).
app:
  demo-seed:
    enabled: true

spring:
  datasource:
    # Local MySQL password; override with DB_PASSWORD in your shell or .env.
    password: ${DB_PASSWORD:changeme}

  jpa:
    show-sql: true
  flyway:
    clean-disabled: false

# Local dev often runs without Redis/RabbitMQ; keep actuator health usable.
management:
  health:
    redis:
      enabled: false
    rabbit:
      enabled: false

logging:
  level:
    com.school.erp: DEBUG
    org.hibernate.SQL: DEBUG
