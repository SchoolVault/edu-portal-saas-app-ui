# Active when spring.profiles.active includes dev (default in application.yml for IDE work).
# For Docker Desktop + Redis + RabbitMQ parity with prod, use profile ml (application-ml.yml) and set DB_URL / REDIS_* / RABBITMQ_*.
#
# Local IDE → Aiven MySQL: set DB_URL, DB_USERNAME, DB_PASSWORD on THIS run configuration (not only system env).
# 1) Aiven → your service → Networking / trusted sources: add your public IP (/32) or temporarily 0.0.0.0/0 to test.
# 2) Confirm credentials outside Spring: mysql -h <host> -P <port> -u avnadmin -p --ssl-mode=REQUIRED defaultdb
# 3) If you still get 1045: reset avnadmin password in Aiven, re-paste into IDE (no trailing newline). Hikari DEBUG below logs jdbcUrl + username at startup.
app:
  demo-seed:
    enabled: true
  dev:
    mode: true
  datasource:
    slow-query:
      enabled: true
      threshold-ms: 500

spring:
  # Datasource URL/user/password come from application.yml (${DB_URL}, ${DB_USERNAME}, ${DB_PASSWORD}).
  # Do not default DB_PASSWORD here: a forgotten env var would send a wrong password (e.g. to Aiven) and cause MySQL 1045.

  # Local IDE: no Redis/Valkey or RabbitMQ required — only MySQL (see docker-compose or Aiven).
  cache:
    type: none
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

  jpa:
    show-sql: true
  flyway:
    clean-disabled: false

# Local dev often runs without Redis/RabbitMQ; keep actuator health usable.
management:
  health:
    redis:
      enabled: false
    rabbit:
      enabled: false

logging:
  level:
    com.school.erp: DEBUG
    org.hibernate.SQL: DEBUG
    com.zaxxer.hikari.HikariConfig: DEBUG
