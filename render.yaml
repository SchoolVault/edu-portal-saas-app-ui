# Render Blueprint — Docker API from monorepo root; static UI from /frontend.
# Dashboard (manual): Language = Docker, Root Directory empty, Dockerfile Path = Dockerfile
# Or: Root Directory = backend-spring, Dockerfile Path = Dockerfile

services:
  - type: web
    name: schoolvault-api
    region: oregon
    plan: starter
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DEMO_SEED_ENABLED
        value: "false"
      - key: CACHE_TYPE
        value: none
      - key: SPRING_AUTOCONFIGURE_EXCLUDE
        value: org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # Public origin of the static site (schoolvault-ui) for email verification links; must match CORS.
      - key: AUTH_EMAIL_VER_PUBLIC_SPA_BASE_URL
        sync: false
      # Direct SendGrid (email verification + optional). Verify sender in SendGrid; do not commit keys.
      - key: APP_INTEGRATION_EMAIL_PROVIDER
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_VERIFICATION_FROM_EMAIL
        sync: false
      - key: EMAIL_VERIFICATION_FROM_NAME
        sync: false
      - key: BREVO_FROM_EMAIL
        sync: false
      - key: AWS_SES_REGION
        sync: false
      - key: AWS_SES_FROM_EMAIL
        sync: false
      - key: AWS_SES_USE_DEFAULT_CREDS
        sync: false
      - key: AWS_SES_ACCESS_KEY
        sync: false
      - key: AWS_SES_SECRET_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      # Optional: only if you use a custom email worker (provider=HTTP or AUTO fallback)
      - key: APP_INTEGRATION_EMAIL_TRIGGER_URL
        sync: false
      - key: APP_SMS_PROVIDER
        sync: false
      - key: APP_SMS_ROUTING_ENABLED
        sync: false
      - key: APP_SMS_ROUTING_PRIORITY
        sync: false
      - key: APP_SMS_SPRINGEDGE_API_KEY
        sync: false
      - key: APP_SMS_SPRINGEDGE_SENDER_ID
        sync: false
      - key: APP_SMS_SPRINGEDGE_BASE_URL
        sync: false
      # Optional: POST /api/v1/internal/jobs/reminders/run with header X-Job-Key (Render Cron Job)
      - key: APP_INTERNAL_JOB_KEY
        sync: false

  # After first deploy: Dashboard → this static site → Redirects/Rewrites →
  #   Source /* → Destination /index.html → Action Rewrite (SPA refresh / deep links).
  - type: web
    name: schoolvault-ui
    region: oregon
    plan: starter
    rootDir: frontend
    runtime: static
    buildCommand: npm ci && npm run build:render
    staticPublishPath: dist/school-erp/browser
    envVars:
      - key: API_URL
        sync: false
      # Optional; build script derives wss://<api-host>/ws from API_URL when API_URL is absolute.
      - key: WEBSOCKET_URL
        sync: false
      - key: USE_MOCKS
        value: "false"
